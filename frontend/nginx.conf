server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service Worker must not be cached by the browser.
    location ~* (sw\.js|workbox-.*\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        types { text/javascript js; }
        try_files $uri =404;
    }

    # Forward API calls to the Spring Boot backend on Fly.io.
    # Usa el DNS interno de Fly.io: <nombre-api>.internal
    # Cambia "enclave-api" por el nombre real de tu backend en Fly.io.
    location /api/ {
        proxy_pass http://enclave-api.internal:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Assets with hash in filename → cache largo (1 año, inmutable)
    location ~* \.(js|css|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every non-asset URL returns index.html so React Router
    # handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
