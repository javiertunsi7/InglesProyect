# fly.toml for enclave-web
# Cambia "app" al nombre que elijas en flyctl (ej: enclave-ingles-web)
app = "enclave-web"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    hard_limit = 50
    soft_limit = 40
