# fly.toml for enclave-api
# Cambia "app" al nombre que elijas en flyctl (ej: enclave-ingles-api)
app = "enclave-api"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    hard_limit = 25
    soft_limit = 20

  [http_service.checks]
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
