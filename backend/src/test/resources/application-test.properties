# H2 in PostgreSQL mode so the same Flyway migrations run during tests.
spring.datasource.url=jdbc:h2:mem:englishtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

# Deterministic JWT secret so signing/parsing is stable across runs.
security.jwt.secret=test-jwt-secret-32-characters-minimum-length-ok
security.jwt.expiration-minutes=60
