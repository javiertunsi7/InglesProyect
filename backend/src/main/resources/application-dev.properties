# H2 in PostgreSQL compatibility mode so the same Flyway migrations work
# in dev (in-memory) and prod (real Postgres).
spring.datasource.url=jdbc:h2:mem:englishdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
