spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/englishdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

security.jwt.secret=${JWT_SECRET}

app.base-url=${APP_BASE_URL:https://enclave.app}

app.mail.enabled=true
app.mail.from=${MAIL_FROM:noreply@enclave.app}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Stripe — los placeholders del perfil dev se sobreescriben aquí con env vars.
# Si no se aporta STRIPE_SECRET_KEY el SDK fallará al primer uso con AuthenticationException,
# lo cual es el comportamiento deseado en prod (no operar a ciegas con un placeholder).
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.price-monthly=${STRIPE_PRICE_MONTHLY}
stripe.price-yearly=${STRIPE_PRICE_YEARLY}
