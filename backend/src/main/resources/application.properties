spring.application.name=english-learning-backend
server.port=8080
server.servlet.context-path=/api

spring.profiles.active=dev

# Flyway manages the schema; Hibernate only validates entities against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT configuration. Override these in real environments.
security.jwt.secret=change-me-please-this-is-a-development-secret-key-32+chars
security.jwt.expiration-minutes=120

# Base URL used in email links (frontend URL)
app.base-url=http://localhost:5173

# Mail defaults (dev uses MailHog if available, otherwise logs to console)
app.mail.enabled=true
app.mail.from=noreply@enclave.app
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# VAPID keys for Web Push (generate once with `npx web-push generate-vapid-keys`)
# If blank, keys are generated on startup and logged to console.
app.vapid.public-key=
app.vapid.private-key=

# Push notification reminders
app.notifications.daily-reminder.enabled=true

# Stripe (test mode — override in prod)
stripe.secret-key=sk_test_placeholder
stripe.webhook-secret=whsec_placeholder
stripe.price-monthly=price_monthly_placeholder
stripe.price-yearly=price_yearly_placeholder
