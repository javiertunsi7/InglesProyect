services:
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: englishdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d englishdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/englishdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me-in-real-life-this-is-a-32-char-secret
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      APP_BASE_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
